x-ai-healthcheck-base: &ai-healthcheck-base
  test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
  interval: 10s
  timeout: 5s
  retries: 5

services:
  # ═══════════════════════════════════════════════════════════════
  # DATABASE - PostgreSQL con PostGIS
  # ═══════════════════════════════════════════════════════════════
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: citizen-science-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 2s
      retries: 5

  # ═══════════════════════════════════════════════════════════════
  # BACKEND - Spring Boot
  # ═══════════════════════════════════════════════════════════════
  backend:
    build:
      context: ./CitizenScienceBackend
      dockerfile: Dockerfile
    container_name: citizen-science-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - AI_CONTAINERS=${AI_CONTAINERS:-ai_service,ai_service_placeholder}
    volumes:
      - sighting_images:/app/uploads/sightings
    depends_on:
      postgres:
        condition: service_healthy
      ai_service:
        condition: service_healthy
      ai_service_placeholder:
        condition: service_healthy
    # restart: unless-stopped
    # healthcheck:
    #   test: ["CMD-SHELL", "java -cp /app/resources:/app/classes:/app/libs/* org.springframework.boot.actuate.health.HealthEndpoint || exit 1"]
    #   interval: 5s
    #   timeout: 3s
    #   retries: 5
    #   start_period: 30s

  # ═══════════════════════════════════════════════════════════════
  # FRONTEND - Flutter Web
  # ═══════════════════════════════════════════════════════════════
  frontend:
    build:
      context: ./citizen_science
      dockerfile: Dockerfile
    container_name: citizen-science-frontend
    ports:
      - "8081:80"
    # depends_on:
    #   backend:
    #     condition: service_healthy
    # restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════
  # AI SERVICE - Python FastAPI
  # ═══════════════════════════════════════════════════════════════
  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: citizen-science-ai
    ports:
      - "8000:8000"
    volumes:
      - ai_models:/app/AiModels
    # restart: unless-stopped
    healthcheck:
      <<: *ai-healthcheck-base
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════
  # AI SERVICE PLACEHOLDER - Python FastAPI (placeholder for testing)
  # ═══════════════════════════════════════════════════════════════
  ai_service_placeholder:
    build:
      context: ./ai_service_placeholder
      dockerfile: Dockerfile
    container_name: citizen-science-ai-placeholder
    ports:
      - "8002:8000"
    # restart: unless-stopped
    healthcheck:
      <<: *ai-healthcheck-base
      start_period: 10s

volumes:
  postgres_data:
  sighting_images:
  ai_models:
