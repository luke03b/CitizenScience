# Profilo Docker
server.port=8080

# Upload
app.upload.dir=/app/uploads/sightings

# Database (da variabili d'ambiente Docker)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JWT (da variabili d'ambiente Docker)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS (da variabili d'ambiente Docker)
allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
