spring.application.name=CitizenScienceBackend
server.port=8080

# Database (sviluppo locale)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:citizenscience}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.springframework=INFO

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Upload
app.upload.dir=uploads/sightings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
